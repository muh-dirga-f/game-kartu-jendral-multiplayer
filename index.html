<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jendral Multiplayer Refactor</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="js/config.js"></script>
</head>
<body>
  <div id="start-screen">
    <h1>♠ JENDRAL</h1>
    <button id="multiplayer-btn">MULTIPLAYER</button>
  </div>

  <div id="lobby-screen" class="modal-overlay" style="display:none;">
    <div class="panel lobby-shell">
      <h2>Lobby</h2>
      <label class="field"><span>Nama Anda</span><input id="player-name" maxlength="20" /></label>
      <label class="field"><span>Nama Room</span><input id="room-name" maxlength="30" /></label>
      <button id="create-room-btn" class="btn btn-success">Buat Room</button>
      <label class="field"><span>Kode Room</span><input id="manual-room-code" maxlength="12" /></label>
      <button id="manual-join-btn" class="btn btn-secondary">Gabung Room</button>
      <button id="auto-join-btn" class="btn">Auto Join</button>
      <button id="close-lobby-btn" class="btn">Tutup</button>
    </div>
  </div>

  <div id="room-screen" class="modal-overlay" style="display:none;">
    <div class="panel room-shell">
      <div class="room-actions">
        <button id="start-room-btn" class="btn btn-success">Mulai Game</button>
        <button id="leave-room-btn" class="btn btn-danger">Keluar</button>
      </div>
      <button id="toggle-lock-btn" style="display:none"></button>
      <div id="room-players" class="players-list"></div>
      <div id="ui">
        <div id="status"></div>
        <button id="passBtn" class="btn">PASS</button>
        <div id="hand"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
